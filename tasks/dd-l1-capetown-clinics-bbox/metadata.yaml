task_id: dd-l1-capetown-clinics-bbox
category: data_discovery
difficulty: L1
author: task-design-agent
date: 2026-05-08
drift_sensitivity: low
tolerances:
  count_pct: null
  area_pct: null
  jaccard_min: null
  geom_eps_m: null
  bbox_eps_deg: 1.0e-6
  rationale: |
    The persona's deliverable is a discrete inventory (record count,
    overall bbox, count-per-subdistrict roll-up) over a fully bundled,
    deterministic CSV fixture of 80 rows. There is no upstream drift
    and no projection step, so the heuristic L1 ±5 % count default is
    replaced by strict equality on `count` and on the per-subdistrict
    map values — a correct solution returns exactly 80 and exactly the
    reference per-subdistrict distribution. The bbox is graded
    componentwise (xmin, ymin, xmax, ymax as four independent
    subchecks) with a 1e-6° tolerance per component (~ 11 cm at the
    equator) — far tighter than any rounding the agent would
    legitimately apply, but loose enough to absorb float printer
    differences (numpy float64 vs Python float repr). Splitting the
    bbox into four subchecks is deliberate: a lat / lon swap (a common
    L1 failure on bbox-shaped outputs) is then partially credited and
    distinguishable from "agent forgot bbox altogether". Jaccard / area
    / IoU heuristics do not apply (no set-membership question, no
    polygons).
design_note: |
  The bbox phrasing was trimmed on 2026-05-28 from "as a 4-element
  array following the standard GeoJSON bbox convention" to inline
  cardinal-direction order "(west, south, east, north)". The previous
  wording named RFC 7946 by reference, which pins both axis order and
  WGS84 — too explicit a hint for an L1 task whose broken_wrong_bbox
  fixture targets exactly the lat/lon swap. Four post-cutoff runs
  (opus + gemma-4-26b) all scored 1.0 under the convention-name
  wording without surfacing the swap. The cardinal-direction form
  still gives the order (the persona is a non-engineer, some
  disambiguation is legitimate for a json-not-geojson output) but
  drops the array-shape and convention-name hints; the agent has to
  derive both from the four cardinal coordinates listed.
broken_solutions:
  wrong_format:
    description: |
      Agent wrote the inventory as CSV instead of JSON. Gate 1 fails
      because the file does not parse as a JSON object. Score = 0.
    expected_score_range: [0.0, 0.0]
    measured_score: 0.0
  wrong_bbox:
    description: |
      Agent reported the bbox in [ymin, xmin, ymax, xmax] order — a
      lat / lon swap, the classic L1 failure when the output schema is
      a flat 4-list. count and count_per_subdistrict are correct.
      The four bbox subchecks (weight 3.0 each) fail; count, key-set,
      per-key-values, and sum-consistency all pass. 10 / 22 ≈ 0.455.
    expected_score_range: [0.45, 0.55]
    measured_score: 0.455
  wrong_attributes:
    description: |
      Agent listed all eight subdistricts but assumed an equal split
      (80 / 8 = 10 per subdistrict). Actual distribution is non-
      uniform (12, 12, 11, 10, 10, 9, 8, 8). Only
      `subdistrict_counts_match` fails (per-key value mismatch on six
      of eight keys, weight 3.0); count, four bbox subchecks, key-set,
      and sum-consistency all pass (8 × 10 = 80 by coincidence).
      19 / 22 ≈ 0.864.
    expected_score_range: [0.85, 0.95]
    measured_score: 0.864
notes:
  - |
    Bundled input is generated by `data/_prepare_input.py` from a
    closed-form synthesis of 80 clinic Points distributed across eight
    Cape Town Metropolitan Health Services subdistricts (Western,
    Southern, Tygerberg, Northern, Eastern, Klipfontein, Mitchells
    Plain, Khayelitsha) with deliberately non-uniform per-subdistrict
    counts. Hand-crafting (rather than slicing Overture) is justified
    by AUTHOR_CONTEXT.md: the inventory anchors on `amenity=clinic`
    (an OSM tag with no clean Overture `places.place` equivalent in
    Cape Town), and the task is *about* CSV-with-WKT parsing + count
    + bbox + group-by, not about the realism of the underlying point
    set.
  - |
    Output JSON keys: `count` (int), `bbox` (list of 4 floats in
    EPSG:4326, [xmin, ymin, xmax, ymax]), `count_per_subdistrict`
    (dict[str, int]). The reference writes
    `count_per_subdistrict` sorted alphabetically by subdistrict
    name; the grader does not enforce key order, only key-set
    equality plus per-key value equality.
  - |
    The grader uses two independent sub-keys for the
    count_per_subdistrict deliverable (`subdistrict_keys_match` and
    `subdistrict_counts_match`) so an agent that reports the right
    set of subdistricts but mis-counts within them is partially
    credited. Pairing this with the `count_equals_subdistrict_sum`
    consistency subcheck means that an agent who reports a plausible
    count and a plausible mapping that don't actually agree is also
    caught.
