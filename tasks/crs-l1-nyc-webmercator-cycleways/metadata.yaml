task_id: crs-l1-nyc-webmercator-cycleways
category: crs_reprojection
difficulty: L1
author: task-design-agent
date: 2026-05-07
drift_sensitivity: low
tolerances:
  count_pct: 0.05
  area_pct: null
  jaccard_min: 0.95
  geom_eps_m: null
  rationale: |
    This is a CRS-reprojection task on bundled data. PROJ is deterministic for
    the EPSG:3857 → EPSG:4326 transform, so a correct reference solution and a
    correct system-under-test should agree to sub-millimetre on coordinates and
    to ppm on derived per-segment lengths. The heuristic L1 defaults (count
    ±5 %, Jaccard ≥ 0.9) are kept on count and tightened on Jaccard to 0.95
    because we expect near-exact agreement on feature membership through a
    pure reprojection. The IoU floor is 0.9 — high but loosened from 0.999 to
    absorb the buffer/de-buffer eps used to make IoU meaningful on lines (we
    buffer by 1e-5° ≈ 1 m at this latitude before comparing). Per-feature
    length tolerance is 1 % over a 99.9 %-accurate transform; total length
    tolerance is 1 % to catch systematic scale errors (e.g., a SUT that
    reprojected then accidentally re-scaled to feet).
broken_solutions:
  wrong_format:
    description: |
      Output is a GeoJSON document under the GeoParquet filename. Gate 1
      catches the read failure (`gpd.read_parquet` cannot decode GeoJSON
      bytes) and the score collapses to 0.
    expected_score_range: [0.0, 0.0]
    measured_score: 0.0
  wrong_crs_metadata_only:
    description: |
      CRS metadata stamped as EPSG:4326 but coordinates are still in EPSG:3857
      Web Mercator metres (the SUT skipped the actual reprojection step). This
      is the central-skill failure: the reprojection never happened, and the
      file even lies about it. The single hard gate passes; the four coordinate-
      proof subchecks fail — NYC envelope (weight 4), IoU (weight 4), per-feature
      length (weight 3), and total-length (weight 3) — totalling 14 of the 20
      weighted points. The count, geom-type, id-set, attribute, and both CRS
      subchecks still pass (6/20). 6/20 weighted points.
    expected_score_range: [0.25, 0.35]
    measured_score: 0.3
  wrong_attributes:
    description: |
      Geometry and CRS are correct, but the SUT dropped the identifying
      attributes (`class`, `name`) when round-tripping through a thin
      GeoDataFrame. Only the identifying-attributes subcheck (weight 2)
      fails — a secondary-contract slip, not the central reprojection skill.
      18/20 weighted points.
    expected_score_range: [0.85, 0.95]
    measured_score: 0.9
notes:
  - |
    Bundled input is generated by `data/_prepare_input.py` from Overture
    release 2026-04-15.0, theme=transportation, type=segment, filter
    `class = 'cycleway'`. The fetched WGS84 geometry is reprojected to
    EPSG:3857 *at authoring time* so the bundled file matches the persona's
    upstream tile-rendering tool output (the persona does not see the
    Overture WGS84 source).
  - |
    The grader rebuffer-and-IoU's the line networks at eps=1e-5° (≈ 1 m at
    NYC's latitude) so the IoU primitive (which is area-based) becomes
    meaningful for line geometries. A per-feature `topology_equal_within_eps`
    subcheck would be tighter but pyproj sometimes shifts vertices by a few
    µm on round trips through Mercator, which would falsely fail strict
    Hausdorff checks on long segments.
  - |
    The task adds `pyarrow` to the project's pinned dependencies (and
    rebuilds the Docker image). GeoParquet read/write requires it; the
    other six tasks in INVENTORY.md that declare GeoParquet output will
    benefit too. Recorded as a library extension.
