task_id: dd-l1-london-parks-count
category: data_discovery
difficulty: L1
author: task-design-agent
date: 2026-05-08
drift_sensitivity: low
tolerances:
  count_pct: null
  area_pct: 0.01
  jaccard_min: null
  geom_eps_m: null
  bbox_eps_deg: 1.0e-4
  rationale: |
    The bundled FlatGeobuf is a deterministic Overture slice committed
    once at authoring time, so the persona's three deliverables (count
    of parks ≥ 1 ha, their combined area in hectares, and the WGS84
    bounding box of that subset) admit one correct answer.

    `count` is graded with strict equality (the L1 ±5 % count default
    is replaced because there is no upstream drift and no projection
    step that could reasonably perturb a feature count). `total_area_ha`
    uses ±1 % rather than the L1 ±5 % default because the reference is
    ~520 ha and the natural failure modes (forgetting the filter →
    ~14 % over; computing area in degrees² via EPSG:4326 → seven orders
    of magnitude off; m²-vs-ha unit slip → 10 000× off) all sit far
    outside ±1 %, while still leaving room for pyogrio / fiona / GDAL
    floating-point drift at the 0.01 ha level.

    The bbox is graded as four componentwise subchecks at 1e-4°
    (~ 11 m at this latitude). Splitting it deliberately partial-credits
    a lat / lon swap (a single component flipping vs all four). A
    seventh bbox-range subcheck checks that the four numbers actually
    sit inside lon[-180,180], lat[-90,90] — the canonical detector for
    "agent forgot to reproject from EPSG:27700".

    Jaccard / IoU heuristics do not apply: the task asks for scalar
    summaries, not for a feature set or a polygon comparison.
broken_solutions:
  wrong_format:
    description: |
      Agent wrote the summary as CSV instead of JSON. Gate 1 fails
      because the body does not parse as a JSON object. Score = 0.
    expected_score_range: [0.0, 0.0]
    measured_score: 0.0
  wrong_filter:
    description: |
      Agent ignored the ≥ 1 ha filter and reported summary stats over
      *all* 317 polygons in the FlatGeobuf. count_correct fails (317 vs
      42), total_area_ha_correct fails (~14 % over), and three of the
      four bbox componentwise subchecks fail (the no-filter set has
      slightly wider extents on three corners). Only `bbox_ymax_correct`
      and `bbox_in_wgs84_range` pass.
    expected_score_range: [0.10, 0.25]
    # Re-measured 2026-06-14 after the severity-weight recalibration
    # (count/area 3.0, bbox componentwise 1.0 each, bbox_in_wgs84_range
    # 0.5; total weight 10.5). Both central deliverables wrong -> only
    # bbox_ymax (1.0) + range (0.5) = 1.5/10.5 pass. Most severe
    # non-format failure, now the lowest non-zero bucket.
    measured_score: 0.1429
  wrong_units:
    description: |
      Agent applied the ≥ 1 ha filter and reprojected the bbox
      correctly, but forgot to convert the planar EPSG:27700 area from
      square metres to hectares (reported `total_area_ha = ref *
      10 000`). Only `total_area_ha_correct` fails; count, all four
      bbox componentwise subchecks, and bbox_in_wgs84_range pass.
    expected_score_range: [0.65, 0.78]
    # Re-measured 2026-06-14 after the severity-weight recalibration
    # (count/area 3.0, bbox componentwise 1.0 each, bbox_in_wgs84_range
    # 0.5; total weight 10.5). Only total_area_ha fails -> 3.0 (count) +
    # 4x1.0 (bbox) + 0.5 (range) = 7.5/10.5 pass. Stays the top non-zero
    # bucket: central count is right, one central deliverable (area) is
    # off by a unit slip.
    measured_score: 0.7143
notes:
  - |
    Bundled input is sliced from Overture release 2026-04-15.0,
    `theme=base/type=land_use` filtered to `class='park'`, over an
    inner-London bbox (-0.200, 51.490, -0.080, 51.545). The slice is
    reprojected to EPSG:27700 (British National Grid) and written as
    FlatGeobuf — the canonical UK government CRS plus a streamable
    binary format with a built-in spatial index, as the inventory row
    requests. 317 polygons total, 42 of which are ≥ 1 ha, summing to
    519.1621 ha. The Royal Parks (Hyde, Regent's, Green, St James's,
    Kensington Gardens) are all inside the bbox.
  - |
    The inventory row tags this task with the OSM `leisure=park`
    family, but Overture's `base.land_use` carries a first-class
    `class='park'` value that is the structural equivalent for a green-
    space inventory. AUTHOR_CONTEXT.md and OVERTURE_REFERENCE.md make
    Overture the default authoring source whenever an equivalent
    collection exists; OSM Overpass is a fallback only when no clean
    Overture equivalent is available. The FlatGeobuf format and the
    EPSG:27700 CRS are properties of the *bundled file*, independent
    of where the underlying features came from.
  - |
    The seventh subcheck (`bbox_in_wgs84_range`) is included so a
    submission that reports the bbox in the *input* CRS (EPSG:27700,
    metres) — i.e. forgot to reproject — is detected even when all
    four componentwise checks are already failing for the same
    reason. It also serves as a sanity gate for any other
    coordinate-system slip (e.g. swapping x and y as 532 000 / 180 000
    metre coordinates, or reporting Web Mercator metres).
