task_id: crs-l1-paris-lambert93
category: crs_reprojection
difficulty: L1
author: task-design-agent
date: 2026-05-07
drift_sensitivity: low
tolerances:
  count_pct: 0.05
  area_pct: 0.01
  jaccard_min: 0.95
  geom_eps_m: 0.001
  rationale: |
    This is a CRS-reprojection task on bundled data. PROJ is deterministic
    for the EPSG:4326 → EPSG:2154 transform, so a correct reference solution
    and a correct system-under-test should agree to sub-millimetre on
    coordinates and to ppm on derived per-feature areas. The heuristic L1
    defaults (count ±5 %, area ±5 %, Jaccard ≥ 0.9) are kept on count and
    tightened on area to 1 % and on Jaccard to 0.95 because we expect
    near-exact agreement on a pure reprojection. The IoU floor is 0.95
    (rather than 0.999) only to absorb the buffer/de-buffer eps inside
    `iou_with_tolerance` and minor sanitisation by the SUT's GeoPackage
    writer.
broken_solutions:
  # Scores re-measured 2026-06-14 after the per-task CRS-dominant
  # reweighting that replaced the 2026-06-07 project-wide 3x data-content
  # weighting (05b389b). New weights: CRS-declaration subchecks
  # (crs_is_canonical, crs_in_meaningful_set) and the transform-proof
  # envelope (coordinates_within_lambert93_paris_envelope) carry weight 5;
  # IoU / per-feature area / total area carry weight 3; data-content
  # (count / id-set / identifying-attributes) and structural (geom-type /
  # column-presence) checks carry weight 1. Total weight 29.
  wrong_format:
    description: |
      Output is still in EPSG:4326 — the SUT skipped the reprojection step
      entirely. The soft CRS grader still reprojects the submission to
      Lambert-93 for the geometric subchecks, so those pass, but the two
      CRS-declaration subchecks (`crs_is_canonical`,
      `crs_in_meaningful_set`, weight 5 each) both fail. 19/29 → 0.655.
    expected_score_range: [0.6, 0.7]
    measured_score: 0.655
  wrong_crs_metadata_only:
    description: |
      CRS metadata stamped as EPSG:2154 but coordinates are still in WGS84
      degrees (the SUT used `set_crs` instead of `to_crs`). Gate 1 passes;
      the Lambert-93 envelope (weight 5, a transform-proof check), IoU,
      per-feature area, and total-area subchecks (weight 3 each) all fail;
      feature-count, geometry-type, id-set, identifying-attributes,
      column-presence, and both CRS-declaration subchecks still pass.
      15/29 → 0.517. This silent-corruption file scores *below*
      `wrong_format` (0.655): it passes the declaration labels but fails
      the checks that prove the reprojection happened, which is the more
      severe failure.
    expected_score_range: [0.45, 0.6]
    measured_score: 0.517
  wrong_attributes:
    description: |
      Geometry and CRS are correct, but the SUT dropped the `height` and
      `num_floors` columns when round-tripping through a thin GeoDataFrame.
      Only the `original_columns_preserved` subcheck (weight 1) fails.
      28/29 → 0.966.
    expected_score_range: [0.92, 0.99]
    measured_score: 0.966
notes:
  - |
    Bundled input is generated by `data/_prepare_input.py` from Overture
    release 2026-04-15.0, theme=buildings, type=building, with a tight
    Marais-area bbox (2.355–2.360 / 48.855–48.859) chosen to land at ~330
    polygons (small-data tier).
  - |
    Output is a GeoPackage in EPSG:2154, which is the canonical native
    container for projected vector data and embeds the CRS in the file
    itself. This avoids the RFC-7946 friction the old GeoJSON output had
    (RFC 7946 mandates WGS84, which conflicts with a Lambert-93 output).
  - |
    `height` and most `num_floors` values in the slice are NaN (Overture
    doesn't carry per-building height for most Paris footprints). The
    grader treats column presence as the persistence check rather than
    per-row attribute equality, since `attribute_match` on numeric NaN-NaN
    pairs returns 0 % match (NaN != NaN under `pd.Series ==`). String
    attributes (`class`, `subtype`, `name`) are dense and grade as
    expected.
