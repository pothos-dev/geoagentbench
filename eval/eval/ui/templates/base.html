<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}eval{% endblock %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.6.1/dist/maplibre-gl.css">
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.6.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pmtiles@3.2.0/dist/pmtiles.js"></script>
  <link rel="stylesheet" href="/static/app.css?v=2">
</head>
<body>
  <nav class="topbar">
    <a href="/" class="topbar-brand">Eval Suite</a>
    <div class="topbar-nav">
      <a href="/" class="{% block nav_tasks %}{% endblock %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Tasks
      </a>
      <a href="/runs" class="{% block nav_runs %}{% endblock %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Runs
      </a>
    </div>
  </nav>
  <main class="main-area">
    {% block breadcrumbs %}{% endblock %}
    {% block body %}{% endblock %}
  </main>
</body>
</html>
