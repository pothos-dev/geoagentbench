# Named adapter targets for `eval run <name>`.
#
# `attributes` is a free-form dict copied verbatim into run.json.
# `headers` values support ${VAR} env-var substitution.
# `max_concurrent_sessions` is the default; --max-parallel overrides it.
#
# Model selection: the Claude Code harness reads `X-Harness-Model` on
# POST /sessions and passes it to `claude --model`. Short aliases
# (opus|sonnet|haiku) and full ids (claude-haiku-4-5-20251001) both work.

adapters:
  claude-code-opus-basic:
    url: http://localhost:8080
    label: "Claude Code (Opus) — basic prompt"
    headers:
      X-Harness-Model: opus
    max_concurrent_sessions: 1
    attributes:
      prompt_variant: basic
      model: opus
      family: claude-code

  claude-code-sonnet-basic:
